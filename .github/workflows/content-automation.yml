name: Content automation (n8n)

on:
  repository_dispatch:
    types: [process-gallery]

# Queue gallery runs — do not cancel when Telegram sends multiple photos quickly.
concurrency:
  group: content-automation
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  process-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment_retry2.outputs.page_url || steps.deployment_retry1.outputs.page_url || steps.deployment.outputs.page_url }}
    # Queue Pages deploys (GITHUB_TOKEN pushes do not trigger deploy.yml).
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with main
        run: git pull --rebase origin main

      - name: Install Pillow
        run: pip install Pillow

      - name: Process gallery images
        id: process
        run: |
          FILE="${{ github.event.client_payload.filename || '' }}"
          if [ -n "$FILE" ]; then
            python scripts/process-gallery.py --only "$FILE"
          else
            python scripts/process-gallery.py
          fi

      - name: Commit processed gallery
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/gallery.json
          git add assets/images/gallery/
          git add -u assets/images/gallery/_incoming/
          if git diff --staged --quiet; then
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
            echo "No gallery changes to commit."
            exit 0
          fi
          git commit -m "chore: process gallery images from n8n"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "changes_detected=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git pull --rebase origin main
            echo "Push attempt $attempt failed, retrying..."
            sleep $((attempt * 4))
          done
          echo "Push failed after retries"
          exit 1

      - name: Setup Pages
        if: steps.commit.outputs.changes_detected == 'true'
        uses: actions/configure-pages@v5

      - name: Build site
        if: steps.commit.outputs.changes_detected == 'true'
        run: python scripts/publish.py

      - name: Upload artifact
        if: steps.commit.outputs.changes_detected == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Wait for artifact
        if: steps.commit.outputs.changes_detected == 'true'
        run: sleep 30

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changes_detected == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 15
        continue-on-error: true

      - name: Deploy to GitHub Pages (retry 1)
        if: steps.commit.outputs.changes_detected == 'true' && steps.deployment.outcome == 'failure'
        id: deployment_retry1
        uses: actions/deploy-pages@v4
        timeout-minutes: 15
        continue-on-error: true

      - name: Deploy to GitHub Pages (retry 2)
        if: steps.commit.outputs.changes_detected == 'true' && steps.deployment.outcome == 'failure' && steps.deployment_retry1.outcome == 'failure'
        id: deployment_retry2
        uses: actions/deploy-pages@v4
        timeout-minutes: 15
