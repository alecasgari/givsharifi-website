name: Content automation (n8n)

on:
  repository_dispatch:
    types: [process-gallery]

concurrency:
  group: content-automation
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  process-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pillow
        run: pip install Pillow

      - name: Process gallery images
        id: process
        run: |
          FILE="${{ github.event.client_payload.filename || '' }}"
          if [ -n "$FILE" ]; then
            python scripts/process-gallery.py --only "$FILE"
          else
            python scripts/process-gallery.py
          fi

      - name: Commit processed gallery
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: process gallery images from n8n"
          file_pattern: "assets/images/gallery/** assets/data/gallery.json"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        if: steps.commit.outputs.changes_detected == 'true'
        run: python scripts/publish.py

      - name: Upload artifact
        if: steps.commit.outputs.changes_detected == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changes_detected == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
